on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generator.yml'
      - 'generator/sonos-docs/src/**/*.ts'
      - 'generator/sonos-docs/package.json'

  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/generator.yml'
      - 'generator/sonos-docs/src/**/*.ts'
      - 'generator/sonos-docs/package.json'

  release:
    types: [published]

jobs:
  test:
    name: 'Build and test on Node ${{ matrix.node }}'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node: [22, 24]
    defaults:
      run:
        working-directory: generator/sonos-docs
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Build library
        run: npm run build
      - name: Run tests
        run: npm test

  npm-publish:
    name: 'Publish to npm'
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: generator/sonos-docs
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Set version from release tag
        run: npm version --no-git-tag-version "${{ github.event.release.tag_name }}"
      - name: Build library
        run: npm run prepack
      - name: Publish to npm
        run: npm publish --access public --provenance --tag ${{ github.event.release.prerelease && 'beta' || 'latest' }}
