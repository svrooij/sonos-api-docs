on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as a pre-release (beta tag on npm)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generator.yml'
      - 'generator/sonos-docs/src/**/*.ts'
      - 'generator/sonos-docs/package.json'

  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/generator.yml'
      - 'generator/sonos-docs/src/**/*.ts'
      - 'generator/sonos-docs/package.json'

jobs:
  test:
    name: 'Build and test on Node ${{ matrix.node }}'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    defaults:
      run:
        working-directory: generator/sonos-docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Build library
        run: npm run build
      - name: Run tests
        run: npm test

  release:
    name: 'Publish to npm'
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: generator/sonos-docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Build library
        run: npm run prepack
      - name: Publish pre-release to npm
        if: inputs.prerelease
        run: npm publish --provenance --tag beta
      - name: Publish to npm
        if: ${{ !inputs.prerelease }}
        run: npm publish --provenance
